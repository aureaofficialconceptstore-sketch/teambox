name: Publish TeamBox

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get TeamBox
        uses: actions/checkout@v6
      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload the app
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
